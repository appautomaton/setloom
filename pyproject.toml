# SPDX-License-Identifier: AGPL-3.0-only

[project]
name = "setloom"
version = "0.1.0"
description = "Open-source, keyboard-first tool and agentic harness for generating, tuning, mixing, and sequencing club tracks and DJ sets."
license = "AGPL-3.0-only"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "mido>=1.3",
    "pyyaml>=6.0",
]

[project.scripts]
setloom = "setloom.cli:run"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/setloom"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
