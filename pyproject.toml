# SPDX-License-Identifier: AGPL-3.0-only

[project]
name = "setloom"
version = "0.1.0"
description = "Open-source, keyboard-first tool and agentic harness for generating, tuning, mixing, and sequencing club tracks and DJ sets."
license = "AGPL-3.0-only"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "mido>=1.3",
    "pyyaml>=6.0",
    "numpy>=2.4.6",
    "pedalboard>=0.9.23",
    "soundfile>=0.14.0",
    "scipy>=1.17.1",
    "pyloudnorm>=0.2.0",
    "librosa>=0.11.0",
]

[project.scripts]
setloom = "setloom.cli:run"

[dependency-groups]
anatomy = [
    "beartype>=0.22.9",
    "demucs>=4.0.1",
    "einops>=0.8.2",
    "essentia==2.1b6.dev1389",
    "rotary-embedding-torch>=0.8.9",
    "torch>=2.12.0",
    "torchfcpe>=0.0.4",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/setloom"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
