#
# ACE-Step local experiment dependency manifest.
#
# This file keeps the ACE-Step stack out of Setloom's root project metadata.
# It is not part of the basic harness or Basic Pitch transcription surface.

[dependency-groups]
acestep = [
    "ace-step @ git+https://github.com/ace-step/ACE-Step-1.5@dce621408bee8c31b4fcf4811682eb9359e1bc94",
    "huggingface-hub[cli]",
]

# ACE-Step 1.5 declares requires-python ">=3.11,<3.13"; its macOS arm64
# dependency set resolves and installs on 3.13, so the cap is treated as stale
# metadata for this local experiment environment. This file is intentionally
# separate from Setloom's root pyproject because these requirements belong to
# the ACE-Step model harness, not the public Setloom package.
[[tool.uv.dependency-metadata]]
name = "ace-step"
version = "1.5.0"
requires-python = ">=3.11"
requires-dist = [
    "torch>=2.7.1; sys_platform == 'win32'",
    "torchvision; sys_platform == 'win32'",
    "torchaudio>=2.7.1; sys_platform == 'win32'",
    "torch>=2.10.0; sys_platform == 'linux'",
    "torchvision; sys_platform == 'linux'",
    "torchaudio>=2.10.0; sys_platform == 'linux'",
    "torch>=2.9.1; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "torchvision; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "torchaudio>=2.9.1; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "transformers>=4.51.0,<4.58.0",
    "diffusers>=0.37.0",
    "gradio==6.2.0",
    "matplotlib>=3.7.5",
    "scipy>=1.10.1",
    "soundfile>=0.13.1",
    "loguru>=0.7.3",
    "einops>=0.8.1",
    "accelerate>=1.12.0",
    "fastapi>=0.110.0",
    "diskcache",
    "uvicorn[standard]>=0.27.0",
    "numba>=0.63.1",
    "vector-quantize-pytorch>=1.27.15",
    "torchcodec>=0.9.1; platform_machine != 'aarch64'",
    "torchao>=0.16.0,<0.17.0; platform_machine != 'aarch64'",
    "torchao; platform_machine == 'aarch64'",
    "toml",
    "mlx>=0.25.2; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "mlx-lm>=0.20.0; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "peft>=0.18.0",
    "lycoris-lora",
    "lightning>=2.0.0",
    "tensorboard>=2.20.0",
    "modelscope",
    "typer-slim>=0.21.1",
    "pytorch-wavelets>=1.3.0",
    "pywavelets>=1.9.0",
    "setuptools<72",
]
