# SPDX-License-Identifier: AGPL-3.0-only
#
# T04 production manifest. This is the executable song design used by
# assemble.py: arrangement intent, lane hierarchy, spatial width, vocal
# placements, ducking, genai atmosphere spans, and listening-gate clips.

version: 1
title: nova-flamma-reimagined
bpm: 123
total_bars: 132

sources:
  variant_dir: local/candidates/T04/seed-4103/variant-01
  voice: local/candidates/genai/latin-vocal-clean-take6-tailfix.wav
  genai_dir: local/candidates/genai

render:
  mix_dir: local/candidates/T04/mix
  premaster_name: nova-flamma-reimagined-v2.wav
  master_name: nova-flamma-reimagined-v2-master.wav
  novoice_name: nova-flamma-reimagined-v2-novoice.wav
  audition_dir: local/candidates/T04/auditions

sections:
  - {name: intro, start_bar: 0, end_bar: 8, intent: "Cold open: center kick pulse, distant smoke, no hook reveal."}
  - {name: groove_a, start_bar: 8, end_bar: 24, intent: "Establish the T04 rolling pocket; no vocal, no lead bus."}
  - {name: break_1, start_bar: 24, end_bar: 32, intent: "First air pocket: remove low-end drive, tease the voice as a future memory."}
  - {name: drop_1, start_bar: 32, end_bar: 64, intent: "First body drop: bass and drums carry; vocal appears only as short response throws."}
  - {name: groove_b, start_bar: 64, end_bar: 72, intent: "Reset the floor before the main break; narrower and more mechanical."}
  - {name: break_2, start_bar: 72, end_bar: 88, intent: "Main vocal event: full stanza, one piece, bed pulls back around it."}
  - {name: peak, start_bar: 88, end_bar: 120, intent: "Peak return: full low-end drive, widened top, hook returns as landmark not pop chorus."}
  - {name: outro, start_bar: 120, end_bar: 132, intent: "DJ-safe exit: drain harmony and voice, leave motion and tail."}

automation:
  ramp_bars: 1.0
  duck_lanes: [chords, arp, pad, genai_pad]
  lanes:
    kick:
      stem: kick
      gain: 0.96
      width: 0.0
      section_db: {intro: -4.0, break_1: -1.5, groove_b: -1.0, break_2: -3.0, outro: -5.0}
    bass:
      stem: bass
      gain: 0.52
      width: 0.0
      section_db: {groove_a: -1.8, drop_1: -0.4, groove_b: -1.4, peak: 0.0}
    perc:
      stem: perc
      gain: 2.70
      width: 1.18
      section_db: {intro: -6.0, groove_a: -2.5, break_1: -8.5, groove_b: -2.0, break_2: -10.0, peak: 0.8, outro: -4.5}
      section_width: {break_1: 0.75, break_2: 0.70, peak: 1.35}
    chords:
      stem: chords
      gain: 1.05
      width: 0.82
      section_db: {break_1: -2.0, drop_1: -2.8, break_2: -6.0, peak: -1.4}
      section_width: {break_1: 1.10, break_2: 0.95, peak: 1.20}
    arp:
      stem: arp
      gain: 0.62
      width: 1.25
      section_db: {drop_1: -3.2, peak: -0.8}
      section_width: {drop_1: 1.05, peak: 1.38}
    pad:
      stem: pad
      gain: 0.42
      width: 1.42
      section_db: {break_1: -1.2, drop_1: -4.5, break_2: -3.5, peak: -2.8}
      section_width: {break_1: 1.55, break_2: 1.40, peak: 1.70}
    fx:
      stem: fx
      gain: 0.95
      width: 1.45
      section_db: {intro: -2.0, groove_a: -1.0, break_1: 0.5, drop_1: -0.8, break_2: 1.0, peak: 0.6, outro: -1.2}

genai_pads:
  - {asset: t04-pad-break, start_bar: 24, end_bar: 32, gain: 0.46, width: 1.50, highpass_hz: 175.0, role: "break_1 breath under the tease"}
  - {asset: t04-pad-break, start_bar: 72, end_bar: 88, gain: 0.42, width: 1.35, highpass_hz: 185.0, role: "main-break bed around the full verse"}
  - {asset: t04-pad-break, start_bar: 88, end_bar: 96, gain: 0.20, width: 1.65, highpass_hz: 220.0, role: "short bloom into peak, kept below the vocal formant band"}

voice:
  pre_roll_s: 0.15
  body_eq: [equalizer, "280", "1q", "+3", equalizer, "3000", "1.2q", "+2.0", equalizer, "4000", "1q", "+1.2"]
  pieces:
    tease:
      trim_start_s: 4.52
      trim_len_s: 6.50
      fade_out_s: 1.2
      chain: [gain, "-5", "{body_eq}", pad, "0", "2", reverb, "24", "38", "100", "10", gain, "-2.2"]
    fullverse:
      trim_start_s: 4.52
      trim_len_s: 29.98
      fade_out_s: 1.2
      chain: [gain, "-5", "{body_eq}", pad, "0", "2", reverb, "26", "38", "100", "10", gain, "-1.8"]
    chop:
      trim_start_s: 18.73
      trim_len_s: 1.10
      fade_out_s: 0.06
      chain: [gain, "-5", highpass, "360", pad, "0", "3", echo, "0.7", "0.55", "366", "0.45", "732", "0.22", gain, "-3.5"]
    hook1:
      trim_start_s: 23.19
      trim_len_s: 4.00
      fade_out_s: 1.2
      chain: [gain, "-5", "{body_eq}", pad, "0", "3", echo, "0.75", "0.46", "366", "0.30", "732", "0.16", reverb, "46", "40", "100", "18"]
    hook2:
      trim_start_s: 27.13
      trim_len_s: 7.37
      fade_out_s: 1.2
      chain: [gain, "-5", "{body_eq}", pad, "0", "3", echo, "0.75", "0.46", "366", "0.30", "732", "0.16", reverb, "46", "40", "100", "18"]
  placements:
    - {piece: tease, bar: 27.75, gain: 0.76, duck_db: -3.6, duck_bars: 2.6, role: "late break_1 hint, not a verse"}
    - {piece: chop, bar: 40.0, gain: 4.70, duck_db: -2.0, duck_bars: 1.2, role: "drop_1 call-response throw"}
    - {piece: chop, bar: 56.0, gain: 4.30, duck_db: -2.0, duck_bars: 1.2, role: "drop_1 second response, lower than the first"}
    - {piece: fullverse, bar: 72.75, gain: 1.18, duck_db: -5.2, duck_bars: 15.6, role: "main break full stanza, one uncut piece"}
    - {piece: hook1, bar: 96.0, gain: 3.35, duck_db: -4.2, duck_bars: 1.9, role: "peak hook landmark"}
    - {piece: hook2, bar: 98.0, gain: 2.45, duck_db: -4.2, duck_bars: 4.3, role: "peak hook tail"}
    - {piece: hook1, bar: 112.0, gain: 2.55, duck_db: -3.2, duck_bars: 1.9, role: "late peak ghost return"}
    - {piece: hook2, bar: 114.0, gain: 1.90, duck_db: -3.2, duck_bars: 4.0, role: "late peak echo, lower than first pass"}

master:
  normalize_peak_db: -1.2
  ffmpeg_chain: "acompressor=threshold=-18dB:ratio=2:attack=20:release=250:makeup=3.5dB,aresample=176400,alimiter=level_in=17.0dB:limit=0.871:attack=5:release=100:level=disabled,aresample=44100"

auditions:
  - {name: reimagined-break1-tease, start_bar: 22, bars: 14}
  - {name: reimagined-drop1-body, start_bar: 32, bars: 18}
  - {name: reimagined-mainbreak-fullverse, start_bar: 70, bars: 22}
  - {name: reimagined-peak-hook, start_bar: 92, bars: 30}
