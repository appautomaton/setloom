# SPDX-License-Identifier: AGPL-3.0-only
# T04: vocal-first design. The voice lead ("Ad Auroram" verse, D minor,
# ethereal female, Recipe 1b voice-only takes) is chosen at the voice gate
# before any arrangement exists; key and bpm below are measured from the
# voice, not chosen. Taste-owner target (2026-06-10): ~4:20 total — 132 bars
# at 123 is 4:18, the phrase grid's closest fit inside the streaming window.
# Two-cycle form kept at this length: break_1 teases the hook, break_2 is the
# main break carrying the full sung verse, peak returns the hook. The voice
# visits the track (vocal share <= 0.15 of bars); never wall-to-wall.

