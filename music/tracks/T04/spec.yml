# SPDX-License-Identifier: AGPL-3.0-only
# T04: vocal-first design. The voice lead ("Ad Auroram" verse, D minor,
# ethereal female, Recipe 1b voice-only takes) is chosen at the voice gate
# before any arrangement exists; key and bpm below are measured from the
# voice, not chosen. Taste-owner target after the listening gate: ~4:02 total —
# 124 bars at 123 BPM, preserving the accepted vocal timing without the long tail.
# Two-cycle form kept at this length: break_1 teases the hook, break_2 is the
# main break carrying the full sung verse, peak returns the hook. The voice
# visits the track (vocal share <= 0.15 of bars); never wall-to-wall.

id: T04
title: nova-flamma
style_pack: melodic-progressive-techno
duration_profile: streaming_edit
seed: 4103
bpm: 123
key: D minor
energy: 7
duration_bars: 124

intent:
  summary: "Emotive Latin vocal over dark hypnotic roller: hook tease at drop one, full verse in the main break, anthemic hook return at peak."
  avoid:
    - "festival-pop drop"
    - "overcrowded bassline"
    - "wall-to-wall vocals; the voice lives in the breaks and drops only"

sections:
  intro: 8
  groove_a: 16
  break_1: 8
  drop_1: 32
  groove_b: 8
  break_2: 16
  peak: 32
  outro: 4

palette:
  kick: "deep short saturated"
  bass: "rolling mono-aware sixteenth pedal"
  drums: "tight hats, restrained percussion, phrase-aware fills"
  chords: "minor stabs with controlled reverb"
  pad: "dark evolving analog atmosphere"
  vocal: "ethereal female Latin verse — THE lead; instruments stay supporting"
  fx: "noise risers, impacts, reverse swells"

style_vector:
  darkness: 7
  melodic_emotion: 8
  groove_hypnosis: 8
  cinematic_tension: 7
  bass_aggression: 6
  arrangement_patience: 9
  hook_density: 5
  vocal_presence: 3
  organic_texture: 1
  peak_time_pressure: 6

