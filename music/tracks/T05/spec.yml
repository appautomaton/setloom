  bass: "Bad Romance moving line (F/G/A/C region), re-timed to 123 BPM -- external, not the harness tonic pedal"
  drums: "tight hats, phrase-gated shaker, restrained percussion"
  chords: "Aminor triad stabs in drops, sustained bed in break/peak"
  pad: "dark conductor bed, wide and low"
  lead: "Lopyt C-minor 8th-note ostinato (pluck) -- external, re-arranged by section; music-box lane replaced by Steinway piano chord bed"
  fx: "risers into drop_1 and peak, impacts on their downbeats"

