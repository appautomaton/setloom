# SPDX-License-Identifier: AGPL-3.0-only
# T05: 123 BPM techno mashup edit. Bad Romance (Lady Gaga) MIDI supplies the
# low-end spine -- its moving F/G/A/C bass line and four-on-floor kick -- re-timed
# to 123 BPM. Lopyt "Megatron" MIDI supplies a C-minor 8th-note ostinato motif
# (synth pluck) re-arranged across the form. A Steinway piano (Logic Pro library
# sample) carries the chord bed in place of the music-box ostinato.
#
# Departure from T04 'nova-flamma': T04 is 123 BPM D minor with a deep
# sidechain roller bass and an ethereal Latin vocal lead. T05 keeps 123 BPM
# (mandate) but diverges on key (A minor), bass identity (external moving line,
# not a tonic pedal), top identity (instrumental ostinato + piano chord bed,
# not vocal), and construction (external MIDI re-arrangement + Steinway sampling,
# not pure generation).
#
# Construction lives in this track's own render code (external MIDI re-arrangement
# + custom numpy synthesis + Steinway sampling), not a harness generator. This
# spec is the routing/intent record; the brief details sources and synthesis.

id: T05
title: bad-romance-megatron-mashup
style_pack: melodic-progressive-techno
duration_profile: streaming_edit
seed: 5505
bpm: 123
key: A minor
energy: 8
duration_bars: 144

intent:
  summary: "123 BPM techno edit mashing Bad Romance's moving low end with Lopyt's C-minor ostinato motif and a Steinway piano chord bed: motif teases in groove_a, breaks to stabs over a kick-out tension bed, drops full, peaks octave-lifted."
  avoid:
    - "festival-pop drop"
    - "wall-to-wall motif; the riff breathes across the form"
    - "tonic-pedal techno bass; the moving Bad Romance line is the point"
    - "imitating either source artist; references are abstract moves only"

