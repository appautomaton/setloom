    derivative: local/candidates/T04/voice/source/latin-vocal-clean-take6-tailfix-breathfix.wav
    method: near-remove
    basis: "12-breath-only-cut-fill proved the target windows; source derivative uses wider no-fill repair so the original source does not retain breath-tail noise."
    approved_window: local/candidates/T04/motif-auditions/voice-repair/12-breath-only-cut-fill-voice-only.wav
    breath_windows_s:
