sections:
  - {name: intro, start_bar: 0, end_bar: 8, intent: "Cold open: center kick pulse, distant smoke, no hook reveal."}
  - {name: groove_a, start_bar: 8, end_bar: 24, intent: "Establish the T04 rolling pocket; no vocal, no lead bus."}
  - {name: break_1, start_bar: 24, end_bar: 32, intent: "First air pocket: remove low-end drive, tease the voice as a future memory."}
  - {name: drop_1, start_bar: 32, end_bar: 64, intent: "First body drop: bass and drums carry; vocal appears only as short response throws."}
  - {name: groove_b, start_bar: 64, end_bar: 72, intent: "Reset the floor before the main break; narrower and more mechanical."}
  - {name: break_2, start_bar: 72, end_bar: 88, intent: "Main vocal event: full stanza, one piece, bed pulls back around it."}
  - {name: peak, start_bar: 88, end_bar: 120, intent: "Peak return: full low-end drive, widened top, hook returns as landmark not pop chorus."}
  - {name: outro, start_bar: 120, end_bar: 124, intent: "DJ-safe exit: drain harmony and voice, leave motion and tail."}

