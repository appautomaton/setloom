# SPDX-License-Identifier: AGPL-3.0-only

id: melodic-progressive-techno

summary: >
  Lane label for melodic/progressive techno. Carries only technical-hygiene
  scaffolding; all musical decisions belong to the track spec and the taste
  owner. See docs/style-grammar.md for the full contract.

generation_defaults:
  duration_profiles:
    club_extended:
      mixable_edges: required
    streaming_edit:
      mixable_edges: reduced

rejection_rules:
  - id: unmixable-edges
    rule: "For forms that request mixable edges, require an intro and outro."
    basis: technical_hygiene
